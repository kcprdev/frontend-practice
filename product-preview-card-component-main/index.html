<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Product preview card component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <section class="card">
      <article>
        <picture>
          <source media="(max-width: 500px)" srcset="images/image-product-mobile.jpg">
          <img class="image" src="images/image-product-desktop.jpg" alt="Product">
        </picture>
      </article>

      <article class="details">
        <p class="category">Perfume</p>

        <h1 class="title">Gabrielle Essence Eau De Parfum</h1>

        <p class="description">A floral, solar and voluptuous interpretation composed by Olivier Polge,
          Perfumer-Creator for the House of CHANEL.</p>
        <div class="price">
          <p aria-label="Current price">$149.99</p>
          <del aria-label="Original price">$169.99</del>
        </div>

        <button class="btn">
          <img src="images/icon-cart.svg" alt="" aria-hidden="true">
          Add to Cart
        </button>
      </article>
    </section>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Karri Chaitanya Pratap Reddy</a>.
  </footer>
</body>

</html>
